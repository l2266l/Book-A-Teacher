<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Biology Teachers</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #C9E4DE;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    h1 {
      color: #007acc;
      margin-bottom: 30px;
    }

    .teacher-card {
      background-color: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      margin: 20px auto;
      max-width: 500px;
      text-align: left;
    }

    .teacher-name {
      font-size: 1.2em;
      font-weight: bold;
      color: #333;
    }

    .teacher-grade {
      font-size: 1em;
      color: #555;
      margin: 10px 0;
    }

    .teacher-mode {
      font-size: 1em;
      color: #777;
      margin-bottom: 10px;
    }

    .chat-button {
      background-color: #FAEDCB;
      color: #333;
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1em;
      font-weight: bold;
    }

    .chat-button:hover {
      background-color: #f4dfb0;
    }

    .language-toggle, .go-back-button {
      position: absolute;
      top: 20px;
      padding: 8px 14px;
      background-color: #FAEDCB;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      color: #007ACC;
      cursor: pointer;
      box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
      transition: background-color 0.3s;
    }

    .language-toggle {
      right: 20px;
    }

    .go-back-button {
      left: 20px;
    }

    .language-toggle:hover, .go-back-button:hover {
      background-color: #f4dfb0;
    }
  </style>
</head>
<body>

  <!-- Go Back Button -->
  <button class="go-back-button" onclick="goBack()">
    <span id="goBackBtnText">Go Back</span>
  </button>

  <button class="language-toggle" onclick="toggleLanguage()" id="langToggleBtn">عربي</button>
  <h1 id="page-title">Biology Teachers</h1>

  <div class="teacher-card">
    <div class="teacher-name" id="teacher1-name">Ms. Sarah Ahmad</div>
    <div class="teacher-grade" id="teacher1-grade">Grade: 9</div>
    <div class="teacher-mode" id="teacher1-mode">Mode: Online & In-person</div>
    <button class="chat-button" onclick="startChat('Sarah Ahmad')" id="chat-button-1">Chat</button>
  </div>

  <div class="teacher-card">
    <div class="teacher-name" id="teacher2-name">Mr. Khalid Al-Farsi</div>
    <div class="teacher-grade" id="teacher2-grade">Grade: 12</div>
    <div class="teacher-mode" id="teacher2-mode">Mode: Online & In-person</div>
    <button class="chat-button" onclick="startChat('Khalid Al-Farsi')" id="chat-button-2">Chat</button>
  </div>

  <script>
    let isArabic = false;

    function translateTeacherCard() {
      document.getElementById("teacher1-name").innerText = isArabic ? "المعلمة سارة أحمد" : "Ms. Sarah Ahmad";
      document.getElementById("teacher1-grade").innerText = isArabic ? "الصف: 9" : "Grade: 9";
      document.getElementById("teacher1-mode").innerText = isArabic ? "عن بعد و حضوري" : "Online & In-person";
      document.getElementById("chat-button-1").innerText = isArabic ? "محادثة" : "Chat";

      document.getElementById("teacher2-name").innerText = isArabic ? "الأستاذ خالد الفارسي" : "Mr. Khalid Al-Farsi";
      document.getElementById("teacher2-grade").innerText = isArabic ? "الصف: 12" : "Grade: 12";
      document.getElementById("teacher2-mode").innerText = isArabic ? "عن بعد و حضوري" : "Online & In-person";
      document.getElementById("chat-button-2").innerText = isArabic ? "محادثة" : "Chat";
    }

    function toggleLanguage() {
      isArabic = !isArabic;
      document.documentElement.lang = isArabic ? "ar" : "en";
      document.documentElement.dir = isArabic ? "rtl" : "ltr";

      document.getElementById("langToggleBtn").innerText = isArabic ? "English" : "عربي";
      document.getElementById("page-title").innerText = isArabic ? "معلمين الأحياء" : "Biology Teachers";
      document.getElementById("goBackBtnText").innerText = isArabic ? "الرجوع" : "Go Back";

      translateTeacherCard();
    }

    function startChat(teacherName) {
      // Save chat to MainChats (optional: implement storage) and redirect to chat page
      window.location.href = "chat.html?teacher=" + encodeURIComponent(teacherName);
    }

    function goBack() {
      window.location.href = "all-subjects.html";
    }

    // Initial translation
    translateTeacherCard();
  </script>

</body>
</html>
